<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎂 Happy Birthday!</title>
  <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink: #ff6eb4;
      --yellow: #ffe066;
      --mint: #6ef0c8;
      --lavender: #c9a6ff;
      --coral: #ff8c69;
      --white: #fff9fe;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ffe0f7 0%, #e0f4ff 50%, #fff3e0 100%);
      font-family: 'Nunito', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Floating emojis background */
    .floaties {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .floatie {
      position: absolute;
      font-size: 2rem;
      animation: floatUp linear infinite;
      opacity: 0.7;
    }

    @keyframes floatUp {
      0%   { transform: translateY(110vh) rotate(0deg); opacity: 0.8; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 10;
      background: white;
      border-radius: 32px;
      padding: 48px 40px 40px;
      max-width: 420px;
      width: 92%;
      text-align: center;
      box-shadow:
        0 0 0 4px var(--pink),
        0 0 0 8px var(--yellow),
        0 20px 60px rgba(255,110,180,0.25);
      animation: popIn 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes popIn {
      from { transform: scale(0.5) rotate(-5deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    /* Cake emoji bounce */
    .cake {
      font-size: 5rem;
      display: block;
      animation: bounce 1.2s ease-in-out infinite;
      margin-bottom: 8px;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0) scale(1); }
      50%       { transform: translateY(-14px) scale(1.1); }
    }

    /* Stars around cake */
    .stars {
      font-size: 1.4rem;
      animation: spin 3s linear infinite;
      display: inline-block;
      margin: 0 4px;
    }
    .stars:nth-child(2) { animation-direction: reverse; animation-duration: 2s; }

    h1 {
      font-family: 'Bubblegum Sans', cursive;
      font-size: 2.4rem;
      background: linear-gradient(90deg, var(--pink), var(--lavender), var(--coral));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 12px 0 4px;
      line-height: 1.1;
    }

    /* Name input area */
    .name-section {
      margin: 20px 0;
    }

    .name-label {
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 8px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .name-input {
      font-family: 'Bubblegum Sans', cursive;
      font-size: 2rem;
      color: var(--pink);
      border: 3px dashed var(--lavender);
      border-radius: 16px;
      padding: 10px 20px;
      width: 100%;
      text-align: center;
      outline: none;
      background: #fff5fc;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .name-input:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 4px rgba(255,110,180,0.15);
    }

    .name-input::placeholder { color: #e0b0d0; }

    /* Message */
    .message {
      background: linear-gradient(135deg, #fff0fa, #f0f8ff);
      border-radius: 20px;
      padding: 20px;
      margin: 20px 0;
      border: 2px solid #f0d0ea;
    }

    .message p {
      font-size: 1rem;
      color: #666;
      line-height: 1.7;
    }

    .message p span.highlight {
      font-weight: 900;
      color: var(--pink);
      font-size: 1.1rem;
    }

    /* Confetti button */
    .btn {
      background: linear-gradient(135deg, var(--pink), var(--coral));
      color: white;
      border: none;
      border-radius: 50px;
      padding: 14px 36px;
      font-family: 'Bubblegum Sans', cursive;
      font-size: 1.3rem;
      cursor: pointer;
      margin-top: 8px;
      box-shadow: 0 6px 20px rgba(255,110,180,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
      letter-spacing: 1px;
    }

    .btn:hover { transform: scale(1.06); box-shadow: 0 10px 28px rgba(255,110,180,0.5); }
    .btn:active { transform: scale(0.97); }

    /* Decorative dots */
    .dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin: 16px 0 0;
    }

    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      animation: dotBounce 1.2s ease-in-out infinite;
    }

    .dot:nth-child(1) { background: var(--pink); animation-delay: 0s; }
    .dot:nth-child(2) { background: var(--yellow); animation-delay: 0.15s; }
    .dot:nth-child(3) { background: var(--mint); animation-delay: 0.3s; }
    .dot:nth-child(4) { background: var(--lavender); animation-delay: 0.45s; }
    .dot:nth-child(5) { background: var(--coral); animation-delay: 0.6s; }

    @keyframes dotBounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* Confetti canvas */
    #confetti-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 999;
    }

    /* Celebration overlay */
    .celebrate-text {
      display: none;
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-family: 'Bubblegum Sans', cursive;
      font-size: 4rem;
      color: white;
      text-shadow: 0 4px 20px rgba(0,0,0,0.3);
      z-index: 1000;
      animation: bigPop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
      white-space: nowrap;
    }

    @keyframes bigPop {
      to { transform: translate(-50%, -50%) scale(1); }
    }
  </style>
</head>
<body>

  <!-- Floating background emojis -->
  <div class="floaties" id="floaties"></div>

  <canvas id="confetti-canvas"></canvas>

  <div class="card">
    <span class="stars">✨</span>
    <span class="cake">🎂</span>
    <span class="stars">✨</span>

    <h1>Happy Birthday!</h1>

    <div class="name-section">
      <div class="name-label">✏️ Type a name</div>
      <input
        class="name-input"
        id="nameInput"
        type="text"
        placeholder="Your name here~"
        maxlength="20"
      />
    </div>

    <div class="message">
      <p>
        Wishing you the most magical day,
        <span class="highlight" id="nameDisplay">bestie</span>! 🌈<br><br>
        May your day be filled with cake 🍰, laughter 😂, and all the things that make your heart go <span class="highlight">uwu</span>! 🐣💖
      </p>
    </div>

    <button class="btn" onclick="celebrate()">🎉 Celebrate!</button>

    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <script>
    // --- Floating emojis background ---
    const emojis = ['🌸','⭐','🍭','🌈','💖','🦋','🍰','✨','🎀','🌟','💕','🍬'];
    const container = document.getElementById('floaties');

    function spawnFloatie() {
      const el = document.createElement('div');
      el.className = 'floatie';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = Math.random() * 100 + 'vw';
      el.style.fontSize = (1.2 + Math.random() * 2) + 'rem';
      const dur = 6 + Math.random() * 8;
      el.style.animationDuration = dur + 's';
      el.style.animationDelay = (Math.random() * -dur) + 's';
      container.appendChild(el);
      setTimeout(() => el.remove(), (dur + 2) * 1000);
    }

    for (let i = 0; i < 18; i++) spawnFloatie();
    setInterval(spawnFloatie, 800);

    // --- Name sync ---
    const nameInput = document.getElementById('nameInput');
    const nameDisplay = document.getElementById('nameDisplay');

    nameInput.addEventListener('input', () => {
      nameDisplay.textContent = nameInput.value.trim() || 'bestie';
    });

    // --- Confetti ---
    function celebrate() {
      launchConfetti();

      // Big pop text
      const old = document.querySelector('.celebrate-text');
      if (old) old.remove();
      const txt = document.createElement('div');
      txt.className = 'celebrate-text';
      const name = nameInput.value.trim() || 'bestie';
      txt.textContent = `🎉 ${name}! 🎉`;
      txt.style.display = 'block';
      document.body.appendChild(txt);
      setTimeout(() => txt.remove(), 2000);
    }

    function launchConfetti() {
      const canvas = document.getElementById('confetti-canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const colors = ['#ff6eb4','#ffe066','#6ef0c8','#c9a6ff','#ff8c69','#ff4fcb','#4fc6ff'];
      const pieces = [];

      for (let i = 0; i < 160; i++) {
        pieces.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height - canvas.height,
          w: 8 + Math.random() * 10,
          h: 4 + Math.random() * 6,
          color: colors[Math.floor(Math.random() * colors.length)],
          speed: 3 + Math.random() * 5,
          angle: Math.random() * 360,
          spin: (Math.random() - 0.5) * 8,
          wobble: Math.random() * 3,
          wobbleSpeed: 0.05 + Math.random() * 0.1,
          wobbleAngle: Math.random() * Math.PI * 2,
        });
      }

      let frame = 0;
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        pieces.forEach(p => {
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.angle * Math.PI / 180);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
          ctx.restore();
          p.y += p.speed;
          p.angle += p.spin;
          p.wobbleAngle += p.wobbleSpeed;
          p.x += Math.sin(p.wobbleAngle) * p.wobble;
        });
        frame++;
        if (frame < 180) requestAnimationFrame(draw);
        else ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
      draw();
    }
  </script>
</body>
</html>
